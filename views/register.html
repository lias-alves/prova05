<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EventHub – Crie sua conta e comece a descobrir eventos incríveis.">
  <title>Cadastro | EventHub</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-bg" aria-hidden="true"></div>

  <main class="auth-container" role="main">
    <div class="auth-card">

      <!-- Logo -->
      <header class="auth-header">
        <div class="auth-logo">
          <div class="auth-logo-icon" aria-hidden="true">🎫</div>
          <span class="auth-logo-text">EventHub</span>
        </div>
        <h1 class="auth-title">Crie sua conta</h1>
        <p class="auth-subtitle">Descubra e participe dos melhores eventos</p>
      </header>

      <!-- Alerta de sucesso/erro -->
      <div id="auth-alert" class="alert" role="alert" aria-live="polite"></div>

      <!-- Formulário de Registro -->
      <form id="register-form" class="auth-form" novalidate autocomplete="on">

        <!-- Nome Completo -->
        <div class="form-group">
          <label class="form-label" for="reg-name">Nome completo</label>
          <div class="form-input-wrapper">
            <input
              type="text"
              id="reg-name"
              name="name"
              class="form-input"
              placeholder="João da Silva"
              autocomplete="name"
              required
              minlength="3"
              aria-describedby="name-error"
            >
            <span class="form-input-icon" aria-hidden="true">👤</span>
          </div>
          <span id="name-error" class="error-message" role="alert"></span>
        </div>

        <!-- E-mail -->
        <div class="form-group">
          <label class="form-label" for="reg-email">E-mail</label>
          <div class="form-input-wrapper">
            <input
              type="email"
              id="reg-email"
              name="email"
              class="form-input"
              placeholder="seu@email.com"
              autocomplete="email"
              required
              aria-describedby="email-error"
            >
            <span class="form-input-icon" aria-hidden="true">📧</span>
          </div>
          <span id="email-error" class="error-message" role="alert"></span>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <label class="form-label" for="reg-password">Senha</label>
          <div class="form-input-wrapper">
            <input
              type="password"
              id="reg-password"
              name="password"
              class="form-input has-right-icon"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
              minlength="6"
              aria-describedby="password-error"
            >
            <span class="form-input-icon" aria-hidden="true">🔒</span>
            <button
              type="button"
              class="form-input-right-icon"
              id="toggle-password"
              aria-label="Mostrar/ocultar senha"
            >👁️</button>
          </div>
          <span id="password-error" class="error-message" role="alert"></span>
        </div>

        <!-- Confirmar Senha -->
        <div class="form-group">
          <label class="form-label" for="reg-confirm-password">Confirmar senha</label>
          <div class="form-input-wrapper">
            <input
              type="password"
              id="reg-confirm-password"
              name="confirm-password"
              class="form-input"
              placeholder="Repita a senha"
              autocomplete="new-password"
              required
              aria-describedby="confirm-password-error"
            >
            <span class="form-input-icon" aria-hidden="true">🔑</span>
          </div>
          <span id="confirm-password-error" class="error-message" role="alert"></span>
        </div>

        <!-- Botão de Cadastro -->
        <button type="submit" id="register-submit" class="btn btn-primary">
          Criar conta
        </button>

      </form>

      <!-- Link para Login -->
      <footer class="auth-footer">
        <p>Já tem uma conta? <a href="login.html" id="go-to-login">Faça login</a></p>
      </footer>

    </div>
  </main>

  <!-- Scripts -->
  <script src="../services/storage.js"></script>
  <script src="../services/api.js"></script>
  <script src="../controllers/authController.js"></script>
  <script>
    AuthController.init('register');

    // Toggle senha
    document.getElementById('toggle-password').addEventListener('click', function () {
      const input = document.getElementById('reg-password');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      this.textContent = isPassword ? '🔒' : '👁️';
    });
  </script>
</body>
</html>
