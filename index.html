<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EventHub – Plataforma de eventos universitários.">
  <title>EventHub</title>
  <style>
    body {
      margin: 0;
      background: #070d1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #94a3b8;
    }
    .redirect-msg {
      text-align: center;
    }
    .redirect-msg span {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      animation: pulse 1s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="redirect-msg">
    <span>🎫</span>
    <p>Redirecionando para o EventHub...</p>
  </div>

  <!--
    ══════════════════════════════════════════════
    POINT OF ENTRY DO PROJETO
    Verifica sessão e redireciona corretamente.
    ══════════════════════════════════════════════
  -->
  <script>
    (function () {
      const session = sessionStorage.getItem('mvc_session');
      if (session) {
        // Usuário já está logado → vai direto para os eventos
        window.location.replace('views/events.html');
      } else {
        // Não logado → vai para o login
        window.location.replace('views/login.html');
      }
    })();
  </script>
</body>
</html>
